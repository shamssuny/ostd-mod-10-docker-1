version: "3.8"

services:

  express:
    image: shamssuny/ostd-1
    ports:
      - "3000:3000"
    networks:
      - app_network

  nginx:
    image: nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - express
    networks:
      - app_network

networks:
    app_network:  

  